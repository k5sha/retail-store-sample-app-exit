apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-root-user
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bad-root-user
  template:
    metadata:
      labels:
        app: bad-root-user
    spec:
      containers:
        - name: nginx
          image: nginx@sha256:6baf43584bcb78f2e5847d1de515f23499913ac9f12bdf834811a3145eb11ca1
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"