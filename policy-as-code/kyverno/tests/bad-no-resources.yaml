apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-no-resources
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bad-no-resources
  template:
    metadata:
      labels:
        app: bad-no-resources
    spec:
      containers:
        - name: nginx
          image: nginx@sha256:6baf43584bcb78f2e5847d1de515f23499913ac9f12bdf834811a3145eb11ca1
          securityContext:
            runAsNonRoot: true