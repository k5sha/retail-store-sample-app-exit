name: CI ECR images

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

permissions:
  contents: read

env:
  AWS_REGION: eu-central-1

jobs:
  build-and-push:
    name: Build & Push (ui, catalog, cart, orders, checkout)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ui, catalog, cart, orders, checkout]

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ github.event.number }}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${GITHUB_REF##*/}"
            if [ "$BRANCH" = "staging" ]; then
              echo "tag=stg-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            else
              echo "tag=prod-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Build and push image
        env:
          AWS_ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          SERVICE: ${{ matrix.service }}
        run: |
          set -e
          IMAGE_NAME="${AWS_ECR_REPOSITORY}/retail-store-retail-store-sample-${SERVICE}"

          cd "src/${SERVICE}"
          docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" .
          docker push "${IMAGE_NAME}:${IMAGE_TAG}"

          # On merge to main/staging, also push environment-specific 'latest'
          if [ "${{ github.event_name }}" = "push" ]; then
            BRANCH="${GITHUB_REF##*/}"
            if [ "$BRANCH" = "staging" ]; then
              docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${IMAGE_NAME}:staging-latest"
              docker push "${IMAGE_NAME}:staging-latest"
            else
              docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${IMAGE_NAME}:latest"
              docker push "${IMAGE_NAME}:latest"
            fi
          fi

  # Update GitOps manifests so Argo CD syncs and deploys the new image
  update-gitops:
    name: Update GitOps image tag
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            echo "tag=stg-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=prod-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update deploy manifests with new image tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            for f in deploy/gitops/*-staging-application.yaml; do
              # Replace either staging-latest or existing stg-<sha> so staging always gets the new tag
              sed -i "s/tag: staging-latest/tag: ${TAG}/; s/tag: stg-[a-f0-9]*/tag: ${TAG}/" "$f"
            done
          else
            for f in deploy/gitops/ui-application.yaml deploy/gitops/catalog-application.yaml deploy/gitops/cart-application.yaml deploy/gitops/orders-application.yaml deploy/gitops/checkout-application.yaml; do
              # Replace either latest or existing prod-<sha> so prod always gets the new tag
              [ -f "$f" ] && sed -i "s/tag: latest/tag: ${TAG}/; s/tag: prod-[a-f0-9]*/tag: ${TAG}/" "$f"
            done
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/gitops/
          git diff --staged --quiet || git commit -m "chore(gitops): set image tag to ${{ steps.tag.outputs.tag }} [skip ci]"
          git push
