alertmanager:
  enabled: true

  config:
    global:
      resolve_timeout: 5m

    route:
      group_by: [ 'alertname', 'namespace', 'severity' ]
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 2h
      receiver: 'webhook-default'

    receivers:
    - name: 'webhook-default'
      webhook_configs:
      - url: 'http://host.minikube.internal:5001/alert'
        send_resolved: true

    inhibit_rules: []
