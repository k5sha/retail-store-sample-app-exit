apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: workflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
    spec:
      containers:
        - name: n8n
          image: docker.n8n.io/n8nio/n8n:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          env:
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: N8N_ENCRYPTION_KEY
            - name: N8N_HOST
              value: "0.0.0.0"
            - name: WEBHOOK_URL
              value: "http://localhost:5678/"
            # Дозволити cookies по HTTP (port-forward / ALB без TLS). Для prod з HTTPS можна прибрати.
            - name: N8N_SECURE_COOKIE
              value: "false"
            # Для GitHub PR review: додай N8N_GITHUB_* або використовуй credentials у workflow
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        # emptyDir: под стартує без чекання PVC. Дані втрачаються при рестарті пода.
        # Для збереження workflows/credentials поверни PVC: замість emptyDir використай
        # persistentVolumeClaim: claimName: n8n-data (і переконайся, що PVC binding працює).
        - name: n8n-data
          emptyDir: {}
