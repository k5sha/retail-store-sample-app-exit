# Дашборди для Grafana (kube-prometheus-stack sidecar підхоплює ConfigMap з label grafana_dashboard=1).
# Джерело: samples/monitoring/dashboards/ — при оновленні скопіюй нові .json сюди в dashboards/.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

configMapGenerator:
  - name: grafana-dashboards-retail
    files:
      - dashboards/retail-hpa-demo.json
    options:
      labels:
        grafana_dashboard: "1"
