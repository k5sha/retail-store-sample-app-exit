apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-store-cart-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/k5sha/retail-store-sample-app-exit.git
    targetRevision: staging
    path: src/cart/chart
    helm:
      values: |
        image:
          repository: 718286622836.dkr.ecr.eu-central-1.amazonaws.com/retail-store-retail-store-sample-cart
          tag: stg-e7632c2
        resources:
          limits:
            memory: 512Mi
          requests:
            cpu: 128m
            memory: 384Mi
        autoscaling:
          enabled: true
          minReplicas: 1
          maxReplicas: 10
          targetCPUUtilizationPercentage: 70
  destination:
    server: https://kubernetes.default.svc
    namespace: carts-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

