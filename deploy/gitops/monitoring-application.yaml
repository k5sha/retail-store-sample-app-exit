apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 69.8.2
    helm:
      values: |
        grafana:
          enabled: true
          adminPassword: admin
          service:
            type: LoadBalancer

        prometheus:
          enabled: true
          service:
            type: LoadBalancer
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            scrapeInterval: 15s

        alertmanager:
          enabled: true
          service:
            type: LoadBalancer

        kubeStateMetrics:
          enabled: true

        nodeExporter:
          enabled: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
