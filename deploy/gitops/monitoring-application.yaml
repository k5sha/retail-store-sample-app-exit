apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 69.8.2
    helm:
      values: |
        # Усі сервіси ClusterIP — без LoadBalancer (доступ до Grafana: kubectl port-forward svc/monitoring-grafana -n monitoring 3000:80)
        grafana:
          enabled: true
          adminPassword: admin
          service:
            type: ClusterIP
          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
              labelValue: "1"
              searchNamespace: same
          defaultDashboardsTimezone: browser

        prometheus:
          enabled: true
          service:
            type: ClusterIP
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            scrapeInterval: 15s

        alertmanager:
          enabled: true
          service:
            type: ClusterIP

        kubeStateMetrics:
          enabled: true

        nodeExporter:
          enabled: true

        # Мінімальний набір правил — без etcd, kube-apiserver, scheduler тощо (менше PrometheusRule CR)
        defaultRules:
          create: true
          rules:
            alertmanager: false
            etcd: false
            configReloaders: true
            general: true
            k8sContainerCpuUsageSecondsTotal: true
            k8sContainerMemoryWorkingSetBytes: true
            k8sContainerResource: true
            k8sPodOwner: true
            kubeApiserverAvailability: false
            kubeApiserverBurnrate: false
            kubeApiserverHistogram: false
            kubeApiserverSlos: false
            kubeControllerManager: false
            kubelet: false
            kubeProxy: false
            kubePrometheusGeneral: true
            kubePrometheusNodeRecording: true
            kubernetesApps: true
            kubernetesResources: true
            kubernetesStorage: false
            kubernetesSystem: true
            kubeSchedulerAlerting: false
            kubeSchedulerRecording: false
            kubeStateMetrics: true
            network: false
            node: true
            nodeExporterAlerting: true
            nodeExporterRecording: true
            prometheus: true
            prometheusOperator: true
            windows: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
