apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: autoscaling-demo
  namespace: argocd
spec:
  project: default
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/k5sha/retail-store-sample-app-exit.git
    targetRevision: main
    path: deploy/autoscaling
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
