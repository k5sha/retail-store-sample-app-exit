apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-store-ui-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/k5sha/retail-store-sample-app-exit.git
    targetRevision: staging
    path: src/ui/chart
    helm:
      releaseName: retail-store-ui-staging
      values: |
        image:
          repository: 718286622836.dkr.ecr.eu-central-1.amazonaws.com/retail-store-retail-store-sample-ui
          tag: stg-b3f1daf
          pullPolicy: Always
        podAnnotations:
          app/buildId: "1"
        service:
          type: LoadBalancer
          annotations:
            service.beta.kubernetes.io/aws-load-balancer-type: external
            service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
            service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
            service.beta.kubernetes.io/aws-load-balancer-attributes: "load_balancing.cross_zone.enabled=true"
  destination:
    server: https://kubernetes.default.svc
    namespace: ui-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

