apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-store-orders-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/k5sha/retail-store-sample-app-exit.git
    targetRevision: staging
    path: src/orders/chart
    helm:
      values: |
        image:
          repository: 718286622836.dkr.ecr.eu-central-1.amazonaws.com/retail-store-retail-store-sample-orders
          tag: stg-c5f09e7
        resources:
          limits:
            memory: 512Mi
          requests:
            cpu: 128m
            memory: 384Mi
        autoscaling:
          enabled: true
          minReplicas: 1
          maxReplicas: 10
          targetCPUUtilizationPercentage: 70
        app:
          persistence:
            provider: in-memory
            endpoint: ""
            database: orders
            secret:
              create: true
              name: orders-db
              username: orders
              password: ""
          messaging:
            provider: in-memory
            rabbitmq:
              addresses: []
              secret:
                create: true
                name: orders-rabbitmq
                username: ""
                password: ""
  destination:
    server: https://kubernetes.default.svc
    namespace: orders-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

