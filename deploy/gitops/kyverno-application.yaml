# Kyverno — адмісія в кластері, завжди активна.
# Встановлює Kyverno з офіційного Helm-репозиторію.
# У Argo CD потрібно додати Helm repo: Repositories → Connect Repo → Type: Helm, URL: https://kyverno.github.io/kyverno/
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: "3.3.0"
    helm:
      releaseName: kyverno
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
