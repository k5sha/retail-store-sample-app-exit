# Алерти для retail-store (неймспейси ui-prod, ui-staging, catalog, carts, orders, checkout та їхні staging).
# Щоб Prometheus підхопив правила, label release має збігатися з Helm release name (у Argo CD = Application name = monitoring).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: retail-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: retail.sli
    rules:
    # 5xx rate > 1% (application metrics from Spring Boot /actuator/prometheus)
    - alert: RetailHigh5xxRate
      expr: |
        (
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (job, namespace)
          / sum(rate(http_server_requests_seconds_count[5m])) by (job, namespace)
        ) > 0.01
      for: 3m
      labels:
        severity: critical
        team: retail
      annotations:
        summary: "Retail 5xx error rate above 1%"
        description: "Job {{ $labels.job }} in {{ $labels.namespace }} has 5xx rate > 1% (current: {{ $value }})."

    # Latency p95 > 500ms
    - alert: RetailHighLatencyP95
      expr: |
        histogram_quantile(0.95,
          sum(rate(http_server_requests_seconds_bucket[5m])) by (le, job, namespace)
        ) > 0.5
      for: 3m
      labels:
        severity: warning
        team: retail
      annotations:
        summary: "Retail latency p95 above 500ms"
        description: "Job {{ $labels.job }} in {{ $labels.namespace }} has p95 latency > 500ms."

  - name: retail.rules
    rules:
    # Поди в retail namespaces не в готовому стані
    - alert: RetailPodNotReady
      expr: |
        count by (namespace) (
          kube_pod_status_ready{namespace=~"ui-prod|ui-staging|catalog|catalog-staging|carts|carts-staging|orders|orders-staging|checkout|checkout-staging",condition="false"} == 1
        ) > 0
      for: 5m
      labels:
        severity: warning
        team: retail
      annotations:
        summary: "Retail pod not ready"
        description: "Namespace {{ $labels.namespace }} has pods not ready for more than 5 minutes."

    # Високе використання CPU відносно request (по подах у retail namespaces)
    - alert: RetailHighCPUUsage
      expr: |
        100 * sum by (namespace, pod) (rate(container_cpu_usage_seconds_total{namespace=~"ui-prod|ui-staging|catalog|catalog-staging|carts|carts-staging|orders|orders-staging|checkout|checkout-staging",container!="",image!=""}[5m]))
        / sum by (namespace, pod) (kube_pod_container_resource_requests{namespace=~"ui-prod|ui-staging|catalog|catalog-staging|carts|carts-staging|orders|orders-staging|checkout|checkout-staging",resource="cpu"})
        > 90
      for: 5m
      labels:
        severity: warning
        team: retail
      annotations:
        summary: "High CPU usage in retail workload"
        description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} is using more than 90% of CPU request for 5 minutes."

    # Deployment має 0 реплік (всі поди зникли)
    - alert: RetailDeploymentNoReplicas
      expr: |
        kube_deployment_status_replicas_available{namespace=~"ui-prod|ui-staging|catalog|catalog-staging|carts|carts-staging|orders|orders-staging|checkout|checkout-staging"} == 0
      for: 2m
      labels:
        severity: critical
        team: retail
      annotations:
        summary: "Retail deployment has no available replicas"
        description: "Deployment {{ $labels.deployment }} in {{ $labels.namespace }} has 0 available replicas for 2 minutes."
