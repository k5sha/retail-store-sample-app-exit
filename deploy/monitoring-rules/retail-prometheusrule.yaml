# Retail SLI alerts — aligned with samples/monitoring/alerts/retail-prometheusrule.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: retail-sli-alerts
  namespace: monitoring
  labels:
    release: kube-prom-stack
spec:
  groups:
  - name: retail-sli.rules
    rules:
    - alert: HighErrorRate
      expr: |
        (
          sum(rate(http_requests_total{namespace="default",status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{namespace="default"}[5m]))
        ) > 0.05
      for: 5m
      labels:
        severity: warning
        team: retail
      annotations:
        summary: "High error rate"
        description: "5xx error rate is above 5% for 5 minutes in namespace default."

    - alert: HighLatencyP95
      expr: |
        histogram_quantile(
          0.95,
          sum by (le) (
            rate(http_request_duration_seconds_bucket{namespace="default"}[5m])
          )
        ) > 0.75
      for: 5m
      labels:
        severity: critical
        team: retail
      annotations:
        summary: "High p95 latency"
        description: "P95 latency is above 750ms for 5 minutes in namespace default."
